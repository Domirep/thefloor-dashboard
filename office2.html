<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="robots" content="noindex,nofollow" />
<title>The Floor · Live</title>
<link rel="icon" href="/assets/favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#05060b;overflow:hidden;font-family:'IBM Plex Mono',ui-monospace,monospace;color:#e8dcc0}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block}
  /* the overlay tracks the canvas rect 1:1 so every HUD element scales with the scene (--u = one canvas px) */
  #ov{position:fixed;pointer-events:none;--u:4px}
  .hud{position:absolute;text-shadow:0 2px 0 #000,0 0 12px rgba(0,0,0,.9)}
  #title{top:5.5%;left:1.6%}
  #title h1{font-size:calc(var(--u)*9);letter-spacing:calc(var(--u)*1.1);color:#e6c96b;font-weight:700}
  #title p{font-size:calc(var(--u)*5);letter-spacing:calc(var(--u)*.5);color:#8d7f61;margin-top:calc(var(--u)*1.5)}
  /* left column on purpose: the right third of the canvas belongs to Moloch, and a
     top-right stats block sat directly over his horns. */
  #stats{top:17%;left:1.6%;text-align:left;font-size:calc(var(--u)*5);letter-spacing:calc(var(--u)*.35);line-height:1.9;color:#9c8c68}
  #stats b{color:#e6c96b;font-weight:600}
  #feed{left:1.6%;bottom:4.5%;font-size:calc(var(--u)*5);letter-spacing:calc(var(--u)*.3);line-height:1.95;color:#9c8c68;max-width:44%}
  #feed .l{opacity:0;transform:translateY(4px);animation:in .45s ease-out forwards}
  #feed .l b{color:#e6c96b;font-weight:600}
  #feed .l.burn b{color:#ff9d4a}
  #feed .l.q{filter:opacity(.55)}          /* quiet replay of a recent action, not a live one */
  @keyframes in{to{opacity:1;transform:none}}
  #hint{right:1.6%;bottom:4.5%;font-size:calc(var(--u)*4.5);letter-spacing:calc(var(--u)*.4);color:#5f563f;text-align:right}
  a{color:#8d7f61;text-decoration:none;pointer-events:auto}
  a:hover{color:#e6c96b}
  /* ?embed=1 — inside the dashboard's iframe the page already provides the heading,
     and the nav links would navigate INSIDE the box, so drop both. */
  html.embed #title{display:none}
  html.embed #stats{top:6%}
  html.embed #hint a{display:none}

  /* --- small canvas (phone, or the embedded band): --u collapses to ~1px, which made
         the HUD render at 5px and unreadable. Clamp type to a floor and drop the
         furniture that just becomes clutter at that size. --- */
  #ov.tiny #stats,#ov.tiny #feed{display:none}
  #ov.tiny #title h1{font-size:14px;letter-spacing:1.5px}
  #ov.tiny #title p{font-size:8px;letter-spacing:.5px;margin-top:2px}
  #ov.tiny #hint{font-size:9px;letter-spacing:.4px}
  #ov.tiny .plate{font-size:9px;padding:2px 5px;border-radius:5px}
  #ov.tiny .bub{font-size:9px;padding:3px 6px;border-radius:6px;max-width:52%}
  #ov.tiny .bub::after{border-left-width:3px;border-right-width:3px;border-top-width:4px;bottom:-4px}

  /* ---- firm panel: opens on a DESK CLICK. Always-on plates floating over every
         desk buried the room, so firm identity now lives behind a click. ---- */
  #hitlayer{position:absolute;inset:0;pointer-events:auto;cursor:pointer}
  #panel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.96);
      width:min(calc(var(--u)*200),88%);pointer-events:auto;opacity:0;visibility:hidden;
      transition:opacity .16s ease,transform .16s ease;
      background:linear-gradient(170deg,rgba(26,19,9,.975),rgba(10,8,5,.975));
      border:1px solid #6b5426;border-radius:calc(var(--u)*3);
      box-shadow:0 calc(var(--u)*6) calc(var(--u)*16) rgba(0,0,0,.75);
      padding:calc(var(--u)*6);color:#e8dcc0;font-size:calc(var(--u)*5)}
  #panel.show{opacity:1;visibility:visible;transform:translate(-50%,-50%) scale(1)}
  #panel .ph{display:flex;align-items:center;gap:calc(var(--u)*3);margin-bottom:calc(var(--u)*4)}
  #panel .em{width:calc(var(--u)*16);height:calc(var(--u)*16);border-radius:50%;flex:none;display:grid;place-items:center;
      font-size:calc(var(--u)*8);font-weight:700;color:#0c0906;position:relative;overflow:hidden;
      background:linear-gradient(150deg,#e6c96b,#7a5c10);border:1px solid rgba(0,0,0,.45)}
  #panel .em img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#1d1914}
  #panel .nm{font-size:calc(var(--u)*7);font-weight:700;color:#f4dd9a;line-height:1.15}
  #panel .rk{font-size:calc(var(--u)*4.5);color:#9c8c68;margin-top:calc(var(--u)*1)}
  #panel .big{font-size:calc(var(--u)*11);font-weight:700;line-height:1;margin:calc(var(--u)*2) 0 calc(var(--u)*4)}
  #panel .big.up{color:#7fe0a0}#panel .big.dn{color:#ff6a5a}
  #panel .grid{display:grid;grid-template-columns:1fr 1fr;gap:calc(var(--u)*3) calc(var(--u)*4);
      border-top:1px solid #3a2d16;padding-top:calc(var(--u)*4)}
  #panel .k{color:#8d7f61;font-size:calc(var(--u)*4);letter-spacing:calc(var(--u)*.2)}
  #panel .v{color:#e8dcc0;font-weight:600}
  #panel .memo{margin-top:calc(var(--u)*4);color:#c9b98d;font-style:italic;
      border-left:2px solid #6b5426;padding-left:calc(var(--u)*3);line-height:1.45}
  #panel .note{margin-top:calc(var(--u)*4);color:#7a6f55;font-size:calc(var(--u)*3.8);line-height:1.5}
  #panel .x{position:absolute;top:calc(var(--u)*3);right:calc(var(--u)*4);color:#8d7f61;
      font-size:calc(var(--u)*7);cursor:pointer;line-height:1}
  #panel .x:hover{color:#e6c96b}
  #panel a.xlink{display:block;margin-top:calc(var(--u)*3);color:#8fd6ff;text-decoration:none;
      font-weight:600;pointer-events:auto}
  #panel a.xlink:hover{color:#c8ecff;text-decoration:underline}

  /* ---- crisp DOM text. The 3x5 canvas font was getting chewed up by the post-FX
         (chromatic fringing + grain) and read as mush. Real type instead. ---- */
  #ticker{position:absolute;left:0;top:calc(var(--u)*10);width:min(calc(var(--u)*316),100%);
      height:calc(var(--u)*10);overflow:hidden;display:flex;align-items:center;
      background:linear-gradient(180deg,rgba(7,6,11,.94),rgba(3,3,7,.94));
      border-top:1px solid rgba(122,92,16,.65);border-bottom:1px solid rgba(0,0,0,.85);
      pointer-events:none;
      -webkit-mask-image:linear-gradient(90deg,#000 0,#000 92%,transparent 100%);
      mask-image:linear-gradient(90deg,#000 0,#000 92%,transparent 100%)}
  #tickerRun{white-space:nowrap;will-change:transform;font-size:calc(var(--u)*5.2);
      letter-spacing:calc(var(--u)*.3);color:#e6c96b;font-weight:600;line-height:1}
  #tickerRun i{font-style:normal;color:#6a5a2e;padding:0 calc(var(--u)*2.5)}
  #tickerRun .up{color:#7fe0a0}#tickerRun .dn{color:#ff6a5a}#tickerRun .bn{color:#ff9d4a}

  .plate{position:absolute;transform:translate(-50%,-100%);pointer-events:auto;cursor:pointer;
      white-space:nowrap;font-size:calc(var(--u)*4.4);font-weight:600;line-height:1;
      padding:calc(var(--u)*1.4) calc(var(--u)*2.2);border-radius:calc(var(--u)*1.8);
      background:rgba(7,6,10,.84);border:1px solid rgba(201,162,39,.32);
      color:#c9b98d;text-shadow:0 1px 2px #000;display:none}
  .plate.on{display:block}
  .plate.xh{color:#8fd6ff;border-color:rgba(143,214,255,.32)}
  .plate:hover{border-color:#e6c96b;color:#f4dd9a;background:rgba(16,12,6,.92)}

  /* ---- speech: idle chatter (paper bubble) + shouts at the maw (hot bubble) ---- */
  .bub{position:absolute;transform:translate(-50%,-100%);pointer-events:none;white-space:nowrap;
      font-size:calc(var(--u)*4.3);font-weight:600;line-height:1;
      padding:calc(var(--u)*1.7) calc(var(--u)*2.8);border-radius:calc(var(--u)*2.2);
      background:rgba(238,230,207,.96);color:#1a1409;border:1px solid #b8a578;
      box-shadow:0 calc(var(--u)*1.5) calc(var(--u)*3) rgba(0,0,0,.5);
      opacity:0;transition:opacity .16s ease;display:none;max-width:calc(var(--u)*150);
      overflow:hidden;text-overflow:ellipsis}
  .bub.on{display:block;opacity:1}
  .bub::after{content:'';position:absolute;left:50%;bottom:calc(var(--u)*-2.2);transform:translateX(-50%);
      border-left:calc(var(--u)*2) solid transparent;border-right:calc(var(--u)*2) solid transparent;
      border-top:calc(var(--u)*2.4) solid rgba(238,230,207,.96)}
  .bub.shout{background:#3b1a06;color:#ffd08a;border-color:#8a4a12;font-weight:700;
      letter-spacing:calc(var(--u)*.25)}
  .bub.shout::after{border-top-color:#3b1a06}
</style>
</head>
<body>
<div id="stage"><canvas id="c"></canvas></div>

<div id="ov">
  <div id="hitlayer"></div>
  <div id="ticker"><div id="tickerRun"></div></div>
  <div class="hud" id="title">
    <h1>THE FLOOR</h1>
    <p>ROBINHOOD CHAIN · LIVE</p>
  </div>
  <div class="hud" id="stats">
    <div>OFFERED TO MOLOCH <b id="sBurn">—</b></div>
    <div>SUPPLY <b id="sSupply">—</b></div>
    <div>ON THE FLOOR <b id="sPlayers">—</b></div>
    <div>EPOCH ENDS <b id="sHalve">—</b></div>
  </div>
  <div class="hud" id="feed"></div>
  <div class="hud" id="hint"><a href="/">← dashboard</a> · <a href="/brokers">brokers</a> · <span style="pointer-events:auto;cursor:default" title="Click anyone for their card · click a desk for its firm · press F for the CRT look">click anyone · or a desk</span></div>
  <div id="panel"><span class="x" id="panelX">×</span><div id="panelBody"></div></div>
</div>

<script>
/* ============================================================================
   THE FLOOR — a living pixel diorama, rendered at 480x270 and scaled to fill.

   The story: the floor never closes — it just turns over. A full day passes every
   six minutes, rain rolls through in spells. In the east wall sits MOLOCH, a bull-headed
   idol-machine that devours $FLOOR. Brokers carry offerings to its maw; it
   swallows, the room surges with light, and supply falls. Emissions are what it
   gives back. The halving is Moloch getting sleepy.

   The seven desks ARE the seven firms of the weekly PnL championship (live from
   /api/firm-competition): each monitor trades its firm's P&L in the green or the
   red, a brass nameplate names it, and the week's leader sits at the big desk
   under a gold lamp. Above it all, an LED ticker crawls the tape.
   ========================================================================== */
const W=480,H=270;
const cv=document.getElementById('c'), g=cv.getContext('2d',{willReadFrequently:true,alpha:false});
const bg=document.createElement('canvas'); bg.width=W; bg.height=H; const bgx=bg.getContext('2d');
const lig=document.createElement('canvas'); lig.width=W; lig.height=H; const ligx=lig.getContext('2d');
const bl=document.createElement('canvas'); bl.width=W>>2; bl.height=H>>2; const blx=bl.getContext('2d');
[g,bgx,ligx,blx].forEach(x=>x.imageSmoothingEnabled=false);
const ov=document.getElementById('ov');

/* ---- palette ---- */
/* Base art is painted BRIGHT because the multiply lighting pass darkens everything —
   too-dark raw colours turn the room to mud (learned: avg luminance 10 -> 36). */
const P={
  sky0:'#080b18', sky1:'#101833', sky2:'#1b2648',
  cityD:'#1d2740', cityM:'#27334f', cityL:'#36456a', win:'#ffd98a', win2:'#ffb84d',
  glass:'#1d2b4a', mull:'#0e0a06',
  wallD:'#241a10', wall:'#3d2c1a', wallL:'#54402a',
  trim:'#8a6d16', trimL:'#c9a227',
  floorD:'#402f1c', floor:'#523c26', floorL:'#63492e',
  brass:'#c9a227', brassL:'#e6c96b', brassD:'#7a5c10',
  bronze:'#7a5c2e', bronzeL:'#a8813f', bronzeD:'#3f2f18', bronzeK:'#231a0e',
  skin:'#e8b487', skinD:'#c08a56', skinL:'#f4cfa4',
  shirt:'#efe6cf', collar:'#d9cba6', ink:'#0b0906', rim:'#ffcf8a',
  crt:'#7fe0a0', crtD:'#1d3a2a', paper:'#d9cba6', hairD:'#2a1d12', hairL:'#4a3420',
  cab:'#3a2c1a', cabL:'#54402a', cabD:'#2a2010',
  leaf:'#2f6f3f', leafL:'#48915a', leafD:'#1c3f28', pot:'#7a4a2a', potD:'#502e18',
  aqua:'#7fc4ec', aquaD:'#4a9fd8', up:'#7fe0a0', dn:'#ff6a5a', amber:'#e6c96b'
};
// suited brokers — each has a base/shadow/rim-light tone + a tie colour, so bodies read 3D under the maw's light
const SUITSETS=[
  {b:'#39405f',d:'#242a44',l:'#576186',t:'#9a3a2a'},   // navy
  {b:'#463a52',d:'#2c2436',l:'#6a5a7c',t:'#3a6a52'},   // plum
  {b:'#2c3a44',d:'#1b2730',l:'#47606f',t:'#b58a1e'},   // teal-grey
  {b:'#4c3634',d:'#2f2020',l:'#6e4c48',t:'#c9a227'},   // oxblood
  {b:'#42402f',d:'#2a2820',l:'#5f5c46',t:'#7a5220'},   // olive-charcoal
];
const BOSS_SUIT={b:'#54421e',d:'#332810',l:'#7a6230',t:'#e6c96b'};   // gold pinstripe — the principal

const R=(x,y,w,h,c)=>{ bgx.fillStyle=c; bgx.fillRect(x|0,y|0,w|0,h|0); };
const r=(ctx,x,y,w,h,c)=>{ ctx.fillStyle=c; ctx.fillRect(x|0,y|0,w|0,h|0); };
const rnd=(a,b)=>a+Math.random()*(b-a);
const RI=(a,b)=>Math.floor(rnd(a,b+1));

/* ---- world geometry ---- */
const FLOOR_Y=186;              // where the back wall meets the floor
const LANE=[204,236];           // feet Y for back / front lanes
const MOL={x:326,y:22,w:154,h:210};   // Moloch's alcove
/* Doorway reaches DOWN to the back lane (LANE[0]=204) so people can actually walk
   out of it. It used to float at y120-186, well above the floor everyone walks on. */
const ELEV={x:8,y:146,w:42,h:58};
const TERM={x:150,y:150,w:44,h:36};
/* Ticker baseline. The barrel warp samples inward at the edges, so anything above
   y~10 gets pushed off the top of the frame (y=5 rendered half-clipped). x1 stops
   it short of Moloch's alcove so the tape never crosses his face. */
const TICK={y:12, x1:316};
const CLK={x:210,y:44,r:9};           // wall clock, mounted on the pier
const COOL={x:52,y:190};              // water cooler foot
const CABS=[288,306];                 // filing-cabinet bank (right, before the alcove)
const PEND=[40,106,172,238,304];      // pendant lamp x positions
const FERN={x:15,y:267};              // foreground fern foot

/* ============================ STATIC BACKDROP ============================ */
let cityFar=[],cityNear=[],stars=[];
function buildCity(){
  cityFar=[];cityNear=[];stars=[];
  for(let i=0;i<95;i++) stars.push({x:RI(0,335),y:RI(2,98),a:rnd(.35,1),c:Math.random()<.3?'#cfe0ff':'#8fa4d8'});
  for(let x=-10;x<340;x+=RI(9,16)) cityFar.push({x,w:RI(7,13),h:RI(20,58)});
  for(let x=-8;x<340;x+=RI(13,22)){
    const h=RI(34,86), w=RI(11,18), b={x,w,h,win:[],ant:Math.random()<.35};
    /* FULL-HEIGHT window grid. The old version scattered a handful of lights over
       only the top `h` px while each tower is drawn `h+40` tall — so every building
       was lit along the roofline and pitch black below it. */
    for(let wy=4; wy<h+34; wy+=4)
      for(let wx=2; wx+2<w; wx+=3)
        b.win.push({dx:wx,dy:wy,on:Math.random()<.55,ph:rnd(0,6.28)});
    cityNear.push(b);
  }
}
/* ============================ SKY · DAY/NIGHT · WEATHER ============================ */
/* The sky and skyline live on their OWN canvas because they change all day long;
   the interior is still baked once into `bg` with the window bays left TRANSPARENT
   so the live sky shows through them. */
const skyCv=document.createElement('canvas'); skyCv.width=W; skyCv.height=FLOOR_Y;
const skx=skyCv.getContext('2d'); skx.imageSmoothingEnabled=false;

const DAY_SECS=360;                                     // a full day every 6 minutes
const _now=new Date();
let dayT=((_now.getHours()+_now.getMinutes()/60)/24)%1; // start at the viewer's real local hour
const _q=new URLSearchParams(location.search);          // ?t=0.5 forces the start time (0=midnight, .5=noon)
if(_q.has('t')) dayT=Math.max(0,Math.min(.999,parseFloat(_q.get('t'))||0));
if(_q.has('embed')) document.documentElement.classList.add('embed');
let dayl=0, skyBucket=-1;

const SKYK=[
  {t:0.00,a:'#05070f',b:'#0a1024',c:'#141d3a'},   // midnight
  {t:0.20,a:'#0d1428',b:'#1e2340',c:'#40304a'},   // pre-dawn
  {t:0.26,a:'#2b3f6b',b:'#7a5c72',c:'#d18a5a'},   // sunrise
  {t:0.34,a:'#3f6ba8',b:'#7099c8',c:'#aecbe6'},   // morning
  {t:0.50,a:'#3877bd',b:'#79b0dc',c:'#c3dcf0'},   // noon
  {t:0.66,a:'#3f6ba8',b:'#7f96c2',c:'#ceac80'},   // afternoon
  {t:0.74,a:'#2b3f6b',b:'#8a5f6a',c:'#d1794a'},   // sunset
  {t:0.80,a:'#141d3a',b:'#22203f',c:'#3a2a42'},   // dusk
  {t:1.00,a:'#05070f',b:'#0a1024',c:'#141d3a'},
];
/* ⚠ Must accept BOTH '#rrggbb' and 'rgb(r,g,b)': skyKeys() returns mix() output,
   which is already rgb(), and re-mixing that hit NaN -> an invalid fillStyle that
   canvas silently ignores, so every sky row kept the previous colour (black noon). */
const _hx=h=>{
  if(h.charCodeAt(0)===35) return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const m=h.match(/\d+/g); return [+m[0],+m[1],+m[2]];
};
function mix(A,B,t){
  const a=_hx(A),b=_hx(B);
  return 'rgb('+Math.round(a[0]+(b[0]-a[0])*t)+','+Math.round(a[1]+(b[1]-a[1])*t)+','+Math.round(a[2]+(b[2]-a[2])*t)+')';
}
function skyKeys(t){
  let i=0; while(i<SKYK.length-2 && SKYK[i+1].t<=t) i++;
  const k0=SKYK[i],k1=SKYK[i+1],p=(t-k0.t)/Math.max(1e-6,k1.t-k0.t);
  return {a:mix(k0.a,k1.a,p), b:mix(k0.b,k1.b,p), c:mix(k0.c,k1.c,p)};
}
function paintSky(){
  const K=skyKeys(dayT), horizon=FLOOR_Y-46, night=1-dayl;
  for(let y=0;y<FLOOR_Y;y++){
    const p=y/FLOOR_Y;
    skx.fillStyle = p<.45 ? mix(K.a,K.b,p/.45) : mix(K.b,K.c,(p-.45)/.55);
    skx.fillRect(0,y,W,1);
  }
  const sa=Math.max(0,1-dayl*1.4);                       // stars fade out as it lightens
  if(sa>.02){ stars.forEach(s=>{ skx.globalAlpha=sa*s.a; skx.fillStyle=s.c; skx.fillRect(s.x,s.y,1,1); }); skx.globalAlpha=1; }

  const inDay=dayT>0.22&&dayT<0.78;                      // sun / moon ride an arc
  const p = inDay ? (dayT-0.22)/0.56 : ((dayT>=0.78?dayT-0.78:dayT+0.22)/0.44);
  const bx=26+p*286, by=(horizon-8)-Math.sin(p*Math.PI)*74;
  if(inDay){
    skx.fillStyle='rgba(255,236,170,.18)'; skx.beginPath(); skx.arc(bx,by,15,0,6.2832); skx.fill();
    skx.fillStyle='#fff0b8'; skx.beginPath(); skx.arc(bx,by,6,0,6.2832); skx.fill();
  } else {
    skx.fillStyle='rgba(214,226,255,.14)'; skx.beginPath(); skx.arc(bx,by,13,0,6.2832); skx.fill();
    skx.fillStyle='#e8eeff'; skx.beginPath(); skx.arc(bx,by,5,0,6.2832); skx.fill();
    skx.fillStyle=mix(K.a,K.b,.45); skx.beginPath(); skx.arc(bx-2.6,by-1.6,4.6,0,6.2832); skx.fill();   // crescent
  }
  if(wxr>.02){ skx.fillStyle='rgba(38,44,62,'+(wxr*.45).toFixed(2)+')'; skx.fillRect(0,0,W,FLOOR_Y); }  // overcast

  const far=mix('#141b2e','#6a7c99',dayl), near=mix('#1d2740','#8796b0',dayl), edge=mix('#36456a','#a8b4c8',dayl);
  cityFar.forEach(b=>{ skx.fillStyle=far; skx.fillRect(b.x,horizon-b.h,b.w,b.h+40); });
  cityNear.forEach(b=>{
    skx.fillStyle=near; skx.fillRect(b.x,horizon-b.h,b.w,b.h+40);
    skx.fillStyle=edge; skx.fillRect(b.x,horizon-b.h,b.w,1);
    if(b.ant){
      skx.fillStyle=edge; skx.fillRect(b.x+(b.w>>1),horizon-b.h-6,1,6);
      skx.fillStyle=(Math.sin(T*.003+b.x)>.55)?'#ff6a5a':'#4a2020';                       // aircraft beacon
      skx.fillRect(b.x+(b.w>>1),horizon-b.h-7,1,1);
    }
    b.win.forEach(wn=>{
      const wy=horizon-b.h+wn.dy;
      if(wy>FLOOR_Y-3||wy<1) return;
      if(dayl>.18){ skx.globalAlpha=dayl*.45; skx.fillStyle='#2c3a55'; skx.fillRect(b.x+wn.dx,wy,2,2); skx.globalAlpha=1; }
      /* No per-window flicker. Every pane used to run a ~5s sine, so across ~2000
         panes the skyline strobed permanently. Lights are STATIC; a slow timer
         flips one single window somewhere in the city every few seconds instead. */
      if(night>.06 && wn.on){
        skx.globalAlpha=night; skx.fillStyle=(wn.ph%1)<.28?'#ffb84d':'#ffd98a';
        skx.fillRect(b.x+wn.dx,wy,2,2); skx.globalAlpha=1;
      }
    });
  });
  for(let y=horizon+16;y<FLOOR_Y;y++){ skx.fillStyle='rgba(20,28,52,.10)'; skx.fillRect(0,y,W,1); }   // ground haze
}

function paintStatic(){
  bgx.clearRect(0,0,W,H);           // window bays stay transparent — the live sky shows through

  /* --- interior: ceiling + wall structure --- */
  R(0,0,W,16,P.wallD);
  R(0,15,W,2,P.trim);
  // wall piers between windows (deco verticals)
  const piers=[0,66,132,198,264,306];
  piers.forEach(px=>{ R(px,16,24,FLOOR_Y-16,P.wall); R(px,16,2,FLOOR_Y-16,P.wallL); R(px+22,16,2,FLOOR_Y-16,P.wallD); });
  R(0,16,330,4,P.wall);
  // window mullions + sills
  for(let i=0;i<5;i++){
    const wx=24+i*66;
    R(wx,20,1,FLOOR_Y-38,P.mull);
    R(wx+20,20,1,FLOOR_Y-38,P.mull);
    R(wx,20,42,2,P.mull);
    for(let k=1;k<5;k++) R(wx,20+k*30,42,1,P.mull);       // horizontal glazing bars
    R(wx-2,FLOOR_Y-20,46,3,P.trim); R(wx-2,FLOOR_Y-17,46,2,P.brassD);   // sill
  }
  // wainscot
  R(0,FLOOR_Y-14,330,14,P.wall);
  R(0,FLOOR_Y-14,330,2,P.trim);

  /* --- floor: boards with perspective banding --- */
  for(let y=FLOOR_Y;y<H;y++){
    const t=(y-FLOOR_Y)/(H-FLOOR_Y);
    R(0,y,W,1, t<.3?P.floorD : t<.7?P.floor : P.floorL);
  }
  for(let y=FLOOR_Y+3;y<H;y+=7) R(0,y,W,1,'rgba(0,0,0,.16)');
  for(let x=-40;x<W+80;x+=26){
    for(let y=FLOOR_Y;y<H;y+=7){
      const sk=(y-FLOOR_Y)*0.55;
      R(x+sk,y,1,7,'rgba(0,0,0,.13)');
    }
  }
  // brass inlay strip
  R(0,FLOOR_Y+1,W,1,P.brassD); R(0,FLOOR_Y+2,W,1,'rgba(201,162,39,.25)');

  /* --- elevator (left). Only the SHAFT + surround are baked; the doors are drawn
         per-frame AFTER the actors so a rider is hidden until they slide open. --- */
  const E=ELEV;
  R(E.x-5,E.y-8,E.w+10,E.h+10,P.wallD);
  R(E.x-5,E.y-8,E.w+10,3,P.trim);
  R(E.x-3,E.y-3,E.w+6,E.h+4,'#0c0906');                  // recess
  R(E.x,E.y,E.w,E.h,'#170f08');                          // shaft interior
  for(let yy=E.y;yy<E.y+E.h;yy+=6) R(E.x+2,yy,E.w-4,1,'rgba(255,214,140,.05)');
  R(E.x-3,E.y+E.h-2,E.w+6,2,P.brassD);                   // threshold
  R(E.x-5,E.y-14,E.w+10,3,P.brassD);                     // indicator housing
  R(E.x-5,E.y-14,E.w+10,1,P.brass);

  paintProps();
}

function cabinet(x,base,h){
  const w=16;
  R(x-1,base-h-1,w+2,h+2,P.ink);
  R(x,base-h,w,h,P.cab); R(x,base-h,w,2,P.cabL); R(x,base-h,2,h,P.cabD);
  for(let dy=base-h+3; dy<base-3; dy+=8){ R(x+1,dy,w-2,7,'#2e2212'); R(x+1,dy,w-2,1,P.cabL); R(x+w/2-2,dy+2,4,2,P.brass); }
  R(x,base-1,w,1,'rgba(0,0,0,.35)');
}
const disc=(cx,cy,rr,col)=>{ for(let yy=-rr;yy<=rr;yy++){ const xw=Math.floor(Math.sqrt(Math.max(0,rr*rr-yy*yy))); R(cx-xw,cy+yy,xw*2+1,1,col); } };
function clockFace(cx,cy,rad){
  R(cx-1,cy-rad-4,2,4,P.bronzeD);                    // hanger
  disc(cx,cy,rad+1,'#15100a');                       // drop shadow / outline
  disc(cx,cy,rad,P.brassD);                          // outer bezel
  disc(cx,cy,rad-1,P.brass);                         // inner bezel
  disc(cx,cy,rad-2,P.paper);                         // face
  for(let yy=1;yy<=rad-2;yy++){                      // soft shade in the lower half
    const xw=Math.floor(Math.sqrt(Math.max(0,(rad-2)*(rad-2)-yy*yy)));
    R(cx-xw,cy+yy,xw*2+1,1,'rgba(120,100,60,.09)');
  }
  for(let a=0;a<12;a++){                             // markers — cardinals longer + darker
    const an=a/12*6.2832, card=(a%3===0);
    const r1=rad-2, r2=rad-(card?4.5:3);
    const x1=cx+Math.round(Math.sin(an)*r1), y1=cy-Math.round(Math.cos(an)*r1);
    const x2=cx+Math.round(Math.sin(an)*r2), y2=cy-Math.round(Math.cos(an)*r2);
    R(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1)+1,Math.abs(y2-y1)+1, card?'#1a1409':'#7a6a46');
  }
  R(cx-rad+3,cy-rad+2,3,1,'rgba(255,255,255,.32)');  // glass highlight
  R(cx-rad+2,cy-rad+3,1,2,'rgba(255,255,255,.20)');
}

/* ============================ MOLOCH ============================ */
/* A colossal blackened-bronze idol built INTO the east wall — bull skull, heavy
   sweeping horns, a throne base with an offering altar, and a furnace maw that
   opens to swallow what the floor feeds it.
   ⚠ PAINTED DARK ON PURPOSE: the multiply lighting pass washes bright bronze out
   to beige (v1 read as a boxy robot). Everything menacing here comes from GLOW —
   the maw, the eye-slits and the molten seams — not from the base pigment. */
function paintMoloch(){
  const {x,y,w,h}=MOL, cx=x+(w>>1);
  const K='#0e0c08', D='#191509', M='#241f14', L='#332c1c', S='#443a24';
  const bE='#8a6d16', bH='#c9a227', bHL='#f2dc90';

  /* Alcove is BACKLIT by the furnace — warm at the bottom, cold-black at the top.
     The idol then reads as a black silhouette against it. (Painting both the idol
     AND the recess near-black made the whole thing vanish into one dark slab.) */
  for(let yy=16; yy<y+h+2; yy++){
    const t=(yy-16)/(y+h-16);
    const c = t<.30?'#0d0a07' : t<.52?'#17100a' : t<.70?'#24140a' : t<.86?'#33190b' : '#3d1d0c';
    R(x-10,yy,w+20,1,c);
  }
  R(x-10,16,3,y+h-16,'#2a1f12');
  R(x-10,16,w+20,10,'#15100a'); R(x-10,16,w+20,2,bE); R(x-10,24,w+20,2,'#070604');

  /* THE ROOM CONTINUES INTO THE NICHE. The alcove fill used to cover everything from
     y16 down, including the floor — so the idol looked like a separate panel pasted
     onto the right-hand wall rather than something standing in the same room. Run the
     floorboards, their skew seams and the brass inlay straight through, and frame the
     opening with a pilaster matching the room's own wall piers. */
  for(let yy=FLOOR_Y; yy<y+h+3; yy++){
    const t=(yy-FLOOR_Y)/(H-FLOOR_Y);
    R(x-12,yy,w+24,1, t<.3?P.floorD : t<.7?P.floor : P.floorL);
  }
  for(let yy=FLOOR_Y+3; yy<y+h+3; yy+=7) R(x-12,yy,w+24,1,'rgba(0,0,0,.16)');
  for(let px=-40;px<w+60;px+=26)
    for(let yy=FLOOR_Y; yy<y+h+3; yy+=7)
      R(x-12+px+(yy-FLOOR_Y)*0.55, yy, 1, 7, 'rgba(0,0,0,.13)');
  R(x-12,FLOOR_Y+1,w+24,1,P.brassD); R(x-12,FLOOR_Y+2,w+24,1,'rgba(201,162,39,.25)');
  R(x-14,16,8,FLOOR_Y-16,P.wall); R(x-14,16,2,FLOOR_Y-16,P.wallL); R(x-8,16,2,FLOOR_Y-16,P.wallD);
  R(x-14,FLOOR_Y-14,8,14,P.wall); R(x-14,FLOOR_Y-14,8,2,P.trim);          // wainscot returns into the niche

  /* deco sunburst halo behind the head — warm, so the horns silhouette against it */
  for(let a=0;a<15;a++){
    const an=-Math.PI+(a/14)*Math.PI;
    for(let k=28;k<78;k+=2){
      const rx=cx+Math.cos(an)*k*1.15, ry=(y+58)+Math.sin(an)*k*0.85;
      if(ry<20||rx<x-8||rx>x+w+6) continue;
      R(rx,ry,1,1, k>60?'#2b1a0b':'#3a230e');
    }
  }

  /* THE FACE IS THE IDOL. v2 put a small head on a big blank torso with a furnace
     in its chest — it read as a fireplace in a cabinet. Now the maw IS the mouth,
     the eyes sit right above it, and the horns come off the skull corners, so the
     whole upper structure resolves as one enormous face at a glance. */
  /* Skull is deliberately NARROWER than the alcove: the horns sweep ~21px outward,
     and a wider skull pushed the right horn past x=480 where the canvas clipped it
     (the left one looked fine, which made the bug read as "only one horn drew"). */
  const fx0=348, fx1=452, fw=fx1-fx0;
  const skTop=y+22, jawY=y+90, chinY=y+156;

  /* cranium — TAPERED (a plain rectangle read as a cabinet); narrow crown widening to the brow */
  const chH=jawY-skTop;
  for(let yy=0; yy<chH; yy++){
    const t=yy/chH, ins=Math.round(11*(1-t)*(1-t));
    R(fx0+ins-3, skTop+yy, fw-ins*2+6, 1, K);
  }
  for(let yy=0; yy<chH; yy++){
    const t=yy/chH, ins=Math.round(11*(1-t)*(1-t));
    R(fx0+ins, skTop+yy, fw-ins*2, 1, yy<2?L : (yy<5?S : M));
    R(fx0+ins, skTop+yy, 2, 1, D);                    // left plane falls away
    R(fx0+fw-ins-2, skTop+yy, 2, 1, D);
  }

  /* heavy brow ridge — throws the sockets into shadow */
  R(fx0+2,skTop+22,fw-4,12,K);
  R(fx0+2,skTop+22,fw-4,2,L);
  R(fx0+6,skTop+34,fw-12,2,'#6b4a1e');                // hot under-brow catch

  /* eye sockets (glow drawn per-frame) */
  const ew=38, eh=20, eyY=skTop+38;
  R(fx0+6,eyY,ew,eh,'#050302'); R(fx1-6-ew,eyY,ew,eh,'#050302');
  R(fx0+6,eyY,ew,1,'#0e0a06');  R(fx1-6-ew,eyY,ew,1,'#0e0a06');

  /* nasal ridge between the eyes */
  R(cx-7,skTop+30,14,jawY-skTop-24,D); R(cx-7,skTop+30,3,jawY-skTop-24,M); R(cx+4,skTop+30,3,jawY-skTop-24,K);
  R(cx-5,jawY-16,4,5,'#040302'); R(cx+2,jawY-16,4,5,'#040302');   // nostrils

  /* temple / cheek plates */
  R(fx0,eyY+eh+2,12,26,D); R(fx1-12,eyY+eh+2,12,26,D);
  R(fx0,eyY+eh+2,2,26,L);   R(fx1-2,eyY+eh+2,2,26,L);

  /* muzzle / jaw mass, narrower than the cranium */
  const mx0=cx-48, mx1=cx+48;
  R(mx0-3,jawY-3,(mx1-mx0)+6,(chinY-jawY)+6,K);
  R(mx0,jawY,mx1-mx0,chinY-jawY,D);
  R(mx0+3,jawY+3,(mx1-mx0)-6,(chinY-jawY)-8,M);
  R(mx0+3,jawY+3,(mx1-mx0)-6,1,S);
  R(mx0+6,chinY-8,(mx1-mx0)-12,4,D);                  // chin plate
  R(mx0+6,chinY-8,(mx1-mx0)-12,1,'#6b4a1e');

  /* horns — a genuine curve (out fast, then up) with a dark outline so they read
     against the alcove. Straight stubby ones just looked like brass brackets. */
  /* ⚠ Draw the horn in THREE passes (outline / fill / highlight), never per-segment.
     Segments advance only ~1-2px, so an outline-then-fill loop lets each segment's
     1px-larger outline erase the PREVIOUS segment's brass — the horn then renders
     as a thin dark streak with only its final segment filled. */
  const horn=[];
  for(let i=0;i<30;i++){
    const t=i/29, dx=25*Math.sin(t*1.25), dy=28*t*t+8*t, sz=Math.max(2,Math.round(10-t*8));
    horn.push({t,sz, lx:fx0+5-dx-sz/2, rx:fx1-5+dx-sz/2, hy:skTop+8-dy});
  }
  horn.forEach(h=>{ R(h.lx-1,h.hy-1,h.sz+2,h.sz+2,'#0a0806'); R(h.rx-1,h.hy-1,h.sz+2,h.sz+2,'#0a0806'); });
  horn.forEach(h=>{ const c= h.t>.72?bHL : h.t>.34?bH : bE; R(h.lx,h.hy,h.sz,h.sz,c); R(h.rx,h.hy,h.sz,h.sz,c); });
  horn.forEach((h,i)=>{ if(i%3) return; R(h.lx,h.hy,h.sz,1,'#f7e49a'); R(h.rx,h.hy,h.sz,1,'#f7e49a'); });
  R(fx0-5,skTop+2,20,15,M); R(fx1-15,skTop+2,20,15,M);            // horn roots
  R(fx0-5,skTop+2,20,2,S);  R(fx1-15,skTop+2,20,2,S);

  /* deco crest + finial between the horns */
  for(let i=0;i<4;i++){ const hw2=4+i*5; R(cx-hw2, skTop-9+i*3, hw2*2, 3, i%2?bE:M); }
  R(cx-2,skTop-14,4,6,bH); R(cx-1,skTop-15,2,2,bHL);

  /* ---- the mouth: a furnace maw set into the jaw (fire drawn per-frame) ---- */
  MOL.maw={x:cx-38, y:jawY+10, w:76, h:48};
  const mw=MOL.maw;
  R(mw.x-5,mw.y-5,mw.w+10,mw.h+10,K);
  R(mw.x-2,mw.y-2,mw.w+4,mw.h+4,'#120d07'); R(mw.x-2,mw.y-2,mw.w+4,1,'#5a4626');
  R(mw.x,mw.y,mw.w,mw.h,'#0d0402');

  /* ---- collar + throne base + offering altar ---- */
  const bY=chinY+6;
  for(let i=0;i<5;i++) R(x+4+i*5, bY+i*4, w-8-i*10, 5, i%2?M:D);   // stepped collar/shoulders
  R(x+4,bY,w-8,2,S);
  const aY=y+h-30;
  R(x+2,aY,w-4,30,D); R(x+2,aY,w-4,2,S);
  for(let i=0;i<3;i++) R(x+i*7,aY+7+i*8,w-i*14,4, i%2?M:K);
  R(cx-34,aY-7,68,8,M); R(cx-34,aY-7,68,2,S); R(cx-38,aY+1,76,4,K);
  R(cx-34,aY-7,68,1,'rgba(230,201,107,.35)');
  [cx-56,cx+46].forEach(px=>{ R(px,aY-13,10,4,M); R(px-1,aY-9,12,3,D); R(px+3,aY-1,4,9,K); });
  MOL.braziers=[{x:cx-51,y:aY-13},{x:cx+51,y:aY-13}];             // flames + light drawn per-frame

  MOL.eyes=[{x:fx0+6,y:eyY,w:ew,h:eh},{x:fx1-6-ew,y:eyY,w:ew,h:eh}];
  MOL.seams=[];
  for(let k=0;k<8;k++) MOL.seams.push({x:mx0+6+((k*29)%((mx1-mx0)-18)), y:jawY+6+((k*17)%(chinY-jawY-14)), w:2+((k*5)%7)});
  /* contact shadow where the idol meets the floorboards — sells the weight */
  R(x+1,y+h,w-2,2,'rgba(0,0,0,.50)');
  R(x-4,y+h+2,w+8,2,'rgba(0,0,0,.28)');
  R(x-9,y+h+4,w+18,1,'rgba(0,0,0,.15)');

  MOL.altarY=aY-7; MOL.gauges=[];
}

/* ============================ DESKS ============================ */
const DESKS=[
  {x:64,y:LANE[0],t:2},{x:104,y:LANE[0],t:1},{x:214,y:LANE[0],t:3},{x:254,y:LANE[0],t:1},
  {x:88,y:LANE[1],t:2},{x:186,y:LANE[1],t:4},{x:256,y:LANE[1],t:1}
];
// desk prominence order: the championship leader gets the big centre-front desk, then out from there
const DESK_ORDER=[5,4,6,2,0,1,3];
let leaderDesk=null;
function medalCol(rank){ return rank===1?'#e6c96b':rank===2?'#cdd3da':rank===3?'#c9853f':'#8d9099'; }

function drawDesk(ctx,d){
  const x=d.x,y=d.y,w=30,h=13;
  r(ctx,x-1,y-h-1,w+2,h+2,P.ink);
  r(ctx,x,y-h,w,h,'#4a3418');
  r(ctx,x,y-h,w,2,'#63481f');
  r(ctx,x+2,y-2,3,2,'#2a1c0c'); r(ctx,x+w-5,y-2,3,2,'#2a1c0c');
  // monitor
  const mw=d.t>2?14:11, mh=d.t>2?10:8;
  const sx=x+w/2-mw/2, sy=y-h-mh;
  r(ctx,sx-1,sy-1,mw+2,mh+2,P.ink);
  r(ctx,sx,sy,mw,mh,P.crtD);
  if(d.firm){
    // this monitor trades its firm's P&L — green in the black, red in the hole
    const f=d.firm, up=(f.pnlUsd||0)>=0, line=up?P.crt:P.dn;
    r(ctx,sx+1,sy+1,mw-2,mh-2, up?'#123a24':'#3a1414');
    r(ctx,sx+1,sy+mh-3,mw-2,1,'rgba(0,0,0,.5)');                         // baseline
    for(let k=0;k<mw-2;k++){                                             // a live-looking P&L squiggle, trending with the sign
      const t=k/(mw-3), wob=Math.sin(k*0.9+(f.id||0)+T*0.004)*1.1;
      let yy=sy+mh-3 - (up? t*(mh-4) : (1-t)*(mh-4)) - wob - 1;
      yy=Math.max(sy+1,Math.min(sy+mh-2,yy));
      r(ctx,sx+1+k, yy|0, 1,1, line);
    }
    r(ctx,sx+1,sy+1,2,2, medalCol(f.rank));                             // rank medal chip
    if(f.rank===1){                                                     // gold pennant on the leader's rig
      r(ctx,sx+mw-1,sy-4,1,4,P.brassD);
      r(ctx,sx+mw-5,sy-4,4,3,P.brassL); r(ctx,sx+mw-5,sy-4,4,1,'#fff2c8');
    }
  } else {
    const flick=(Math.sin(T*0.006+x)*0.5+0.5);
    r(ctx,sx+1,sy+1,mw-2,mh-2, flick>.5?'#2a5f42':'#255339');
    for(let i=0;i<3;i++) r(ctx,sx+2,sy+2+i*2, RI(3,mw-4),1, P.crt);
  }
  // desk lamp for higher tiers
  if(d.t>=2){ r(ctx,x+w-6,y-h-7,2,7,P.brassD); r(ctx,x+w-9,y-h-9,8,3,P.brass); }

  if(d.t>=3){ r(ctx,x+3,y-h-3,7,3,P.paper); r(ctx,x+3,y-h-4,7,1,'#efe3c2'); }

/* ============================ WORKERS ============================ */
class Worker{
  constructor(i,boss){
    this.lane=Math.random()<.5?0:1;
    this.x=rnd(56,300); this.y=LANE[this.lane];
    this.boss=!!boss;
    this.ss=boss?BOSS_SUIT:SUITSETS[RI(0,SUITSETS.length-1)];
    this.hair=Math.random()<.5?P.hairD:P.hairL;
    this.hat=boss?true:Math.random()<.4;           // ~40% wear a fedora; the boss always does
    this.hatC=Math.random()<.5?'#20242f':'#2b2118';
    this.dir=Math.random()<.5?-1:1;
    this.state='idle'; this.t=rnd(0,3); this.frame=0; this.fa=0;
    this.carry=null; this.busy=false; this.home=this.x; this.speed=rnd(34,46);
    this.prop=Math.random()<.5?'mug':'paper';      // what they hold while working
    /* ⚠ size MUST stay 22 — the operator art is a pixel grid cropped to a 22-unit
       viewBox, so 22px is exactly 1:1. Drawing it at 20 (or a "depth" 17-21) is a
       FRACTIONAL downscale of pixel art: every source pixel lands on 0.9 of a screen
       pixel and 1px features — eyes, mouths, the whale's face — get dropped outright.
       Any depth/scale effect here has to use integer multiples (22, 44) or none. */
    this.player=null; this.op=null; this.label=''; this.size=22;    // filled in by castRoster()
    this.act=null; this.wind=0;                     // act = x of what they're facing/working; wind = throw wind-up
    this.riding=null;                               // set when they step into the lift; fades them out
  }
  goto(tx,lane,then){ this.tx=tx; this.tlane=lane; this.state='walk'; this.then=then; }
  update(dt){
    this.t-=dt;
    if(this.state==='walk'){
      const ty=LANE[this.tlane];
      if(Math.abs(this.y-ty)>1) this.y+= Math.sign(ty-this.y)*Math.min(22*dt,Math.abs(ty-this.y));
      const d=this.tx-this.x;
      this.dir=d<0?-1:1;
      if(Math.abs(d)>1.2){ this.x+=Math.sign(d)*Math.min(this.speed*dt,Math.abs(d)); this.fa+=dt*9; }
      else { this.lane=this.tlane; this.state='idle'; this.t=rnd(1.5,5); const f=this.then; this.then=null; if(f)f(); }
    } else if(this.state==='work'){ this.fa+=dt*4; if(this.t<=0){ this.state='idle'; this.t=rnd(2,6);} }
    else { // idle: wander or sit down to work
      if(this.t<=0){
        if(Math.random()<.45){ this.state='work'; this.t=rnd(3,9); }
        else this.goto(Math.max(56,Math.min(300,this.x+rnd(-70,70))), Math.random()<.35?1-this.lane:this.lane);
      }
    }
    if(this.riding!=null) this.riding+=dt*1.4;
    if(this.exiting && this.x>ELEV.x+ELEV.w+5) this.exiting=false;   // clear of the doorway
    this.frame=Math.floor(this.fa)%4;
  }
  /* The figure IS the player's highest operator — the game's own pixel-art bust,
     served same-origin from /opart/ so drawing it never taints the canvas (postFX
     reads pixels back every frame). Little legs underneath so the portrait walks. */
  draw(ctx){
    const x=Math.round(this.x), y=Math.round(this.y), d=this.dir;
    const walking=this.state==='walk', working=this.state==='work';
    const step=walking?(this.frame%2):-1;
    const bob=walking?(step?0:1):(working?(Math.sin(this.fa)>0?1:0):(Math.sin(T*.002+x)>.7?1:0));
    /* Face whatever you're interacting with. Before, they walked up to the terminal
       and stood there pointing whichever way they happened to arrive from. */
    const fdir=(this.act!=null) ? (this.act>this.x?1:-1) : d;
    const lean=this.wind ? -3*fdir : (this.act!=null ? fdir : 0);
    const hov=this.floater?Math.round(Math.sin(T*.0016+x*.3)*2):0;   // the whale hovers
    const yy=y-bob, S=this.size, bx=x-(S>>1)+lean, by=yy-(this.floater?3:6)-S+hov;
    if(this.riding!=null) ctx.globalAlpha=Math.max(0,1-this.riding);

    // soft contact shadow (two rects = a squashed ellipse)
    ctx.fillStyle='rgba(0,0,0,.32)'; ctx.fillRect(x-7,y-1,14,2); ctx.fillStyle='rgba(0,0,0,.18)'; ctx.fillRect(x-8,y,16,1);

    if(!this.floater){                                                // legs — a whale hasn't got any
      const lsw=walking?(step?2:-2):0;
      r(ctx,x-4-(step?lsw:0),yy-6,3,6,'#16130d'); r(ctx,x+1+(step?lsw:0),yy-6,3,6,'#1d1811');
      r(ctx,x-4-(step?lsw:0),yy-1,3,1,'#090705'); r(ctx,x+1+(step?lsw:0),yy-1,3,1,'#090705');
    }

    // the operator sprite (transparent-backed, so it reads as a person not a picture)
    const e=this.op;
    if(e && e.ok){
      if(fdir<0){ ctx.save(); ctx.translate(bx+S,by); ctx.scale(-1,1); ctx.drawImage(e.img,0,0,S,S); ctx.restore(); }
      else ctx.drawImage(e.img,bx,by,S,S);
    }
    else { r(ctx,bx+4,by+3,S-8,S-4,'#241d14'); r(ctx,bx+4,by+3,S-8,1,'#3d3422'); }
    ctx.fillStyle='rgba(255,207,138,.18)'; ctx.fillRect(bx+S-1,by+3,1,S-7);   // warm rim on the maw side

    // reaching arm while working the terminal / feeding the maw
    if(this.act!=null){
      const ax=(fdir>0? bx+S-3 : bx-2), ay=by+S-9+(this.wind?-3:0);
      r(ctx,ax,ay,5,2,P.skinD); r(ctx,ax+(fdir>0?3:0),ay,2,2,P.skin);
    }

    // the offering they carry (held on the facing side, raised during the wind-up)
    if(this.carry){
      const cxp=x+(fdir>0?(S>>1)-2:-(S>>1)-5)+lean, cyp=yy-12-(this.wind?5:0);
      r(ctx,cxp,cyp,7,7,P.bronzeK); r(ctx,cxp+1,cyp+1,5,5,P.brass);
      r(ctx,cxp+1,cyp+1,5,1,P.brassL); r(ctx,cxp+2,cyp+2,1,1,'#fff2c8');
    }
    ctx.globalAlpha=1;
  }
}

/* ============================ PLAYERS & OPERATORS ============================ */
/* Real wallets from /api/leaderboard, wearing their highest operator's own pixel
   bust. Art is fetched from the SAME-ORIGIN /opart/ proxy on purpose — pulling it
   straight from thefloor.sh would taint the canvas and break the postFX readback. */
/* The operator art is a 24x24 pixel grid whose outer ring is the rarity colour and
   whose backdrop is an opaque #13100c — drawn raw it reads as a framed PAINTING on
   legs. So we fetch the markup (same-origin), crop the frame ring via the viewBox
   and drop the backdrop to transparent, which yields an actual sprite. Rendering
   from a data: URI keeps the canvas untainted, same as /opart/ would. */
const OPIMG={};
const opSlug=n=>String(n||'Retail Analyst').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
function opImage(name){
  const s=opSlug(name);
  let e=OPIMG[s];
  if(e) return e;
  e={img:null, ok:false, rar:'#8d9099'};                 // rar = rarity colour, reused for the rim + plate
  OPIMG[s]=e;
  fetch('/opart/'+s+'.svg').then(r=>r.text()).then(t=>{
    const m=t.match(/fill="(#[0-9a-fA-F]{6})"/);         // first fill is the border = rarity colour
    if(m) e.rar=m[1];
    /* Rasterise the rect-per-pixel art into a 24x24 grid ourselves. */
    const G=Array.from({length:24},()=>Array(24).fill(null));
    for(const q of t.matchAll(/<rect x="(\d+)" y="(\d+)" width="(\d+)" height="(\d+)" fill="(#[0-9a-fA-F]{6})"/g)){
      const x=+q[1],y=+q[2],w=+q[3],h=+q[4],f=q[5];
      for(let j=0;j<h;j++) for(let i=0;i<w;i++){ const X=x+i,Y=y+j; if(X<24&&Y<24) G[Y][X]=f; }
    }
    /* ⚠⚠ Strip ONLY backdrop cells reachable from the border. THE EYES ARE PAINTED IN
       THE SAME COLOUR AS THE BACKDROP (#13100c) — blanket-replacing that colour with
       transparent deleted them, which is why every face read as blank and the whale
       had no visible eye. Flood-fill from the ring just inside the rarity border (the
       border ring itself is the rarity colour, so it can't be the seed) and keep any
       enclosed pocket: those pockets ARE the facial detail. */
    const BG='#13100c', seen=Array.from({length:24},()=>Array(24).fill(false)), st=[];
    for(let i=1;i<=22;i++) for(const [x,y] of [[i,1],[i,22],[1,i],[22,i]])
      if(G[y][x]===BG && !seen[y][x]){ seen[y][x]=true; st.push([x,y]); }
    while(st.length){
      const [x,y]=st.pop();
      for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
        const X=x+dx, Y=y+dy;
        if(X>=1&&X<=22&&Y>=1&&Y<=22&&!seen[Y][X]&&G[Y][X]===BG){ seen[Y][X]=true; st.push([X,Y]); }
      }
    }
    const cvo=document.createElement('canvas'); cvo.width=22; cvo.height=22;
    const cx2=cvo.getContext('2d'); cx2.imageSmoothingEnabled=false;
    for(let y=1;y<=22;y++) for(let x=1;x<=22;x++){
      const f=G[y][x];
      if(!f || (f===BG && seen[y][x])) continue;          // drop only the true backdrop
      cx2.fillStyle=f; cx2.fillRect(x-1,y-1,1,1);
    }
    e.img=cvo; e.ok=true;                                 // a canvas draws like an image, and never taints
  }).catch(()=>{});
  return e;
}
/* Not every operator is a person. The Activist Whale is a whale — giving it two
   little walking legs looked absurd, so it hovers instead. */
const FLOATERS=new Set(['activist-whale']);
const shortAddr=a=>{ const s=String(a||''); return s.length>=6?('0X'+s.slice(-4)).toUpperCase():s.toUpperCase(); };
function actorLabel(p){ return p ? (p.handle ? '@'+p.handle.toUpperCase() : shortAddr(p.a)) : ''; }

/* Identity plates are DOM now: crisp type, and CLICKABLE for the player card.
   (The old canvas drawLabel/labelRects pair went with the pixel-font version.) */
const LABEL_CAP=6, plateEls=[];
function ensurePlates(){
  while(plateEls.length<workers.length){
    const el=document.createElement('div');
    el.className='plate';
    el.addEventListener('click',ev=>{ ev.stopPropagation(); if(el.__w&&el.__w.player) openPlayer(el.__w.player); });
    ov.appendChild(el); plateEls.push(el);
  }
}
function updatePlates(){
  ensurePlates();
  const u=OVU||1;
  plateEls.forEach(el=>{ el.classList.remove('on'); el.__w=null; });
  const order=workers.slice().sort((a,b)=>{
    const ah=(a.player&&a.player.handle)?1:0, bh=(b.player&&b.player.handle)?1:0;
    if(ah!==bh) return bh-ah;                     // named wallets win the space
    return b.y-a.y;                               // then whoever is nearest the camera
  });
  const cap = ov.classList.contains('tiny') ? 2 : LABEL_CAP;   // plates crowd a small canvas fast
  const used=[]; let n=0;
  for(let i=0;i<order.length && n<cap;i++){
    const w=order[i]; if(!w.label) continue;
    const px=(w.x-VX)*u, py=(w.y-w.size-9)*u, wpx=w.label.length*u*3.0;
    if(px<-40||px>VW*u+40) continue;              // off the cropped view

    let clash=false;
    for(const q of used){ if(Math.abs(q.x-px)<(q.w+wpx)/2 && Math.abs(q.y-py)<u*13){ clash=true; break; } }
    if(clash) continue;
    used.push({x:px,y:py,w:wpx});
    const el=plateEls[n];
    el.__w=w; el.textContent=w.label;
    el.classList.toggle('xh', !!(w.player&&w.player.handle));
    el.style.left=px.toFixed(1)+'px'; el.style.top=py.toFixed(1)+'px';
    el.classList.add('on');
    n++;
  }

/* Chatter has to be PERTINENT — "i need more desk space" only means anything from
   someone actually sat at a small desk. Lines are chosen from the player's real
   on-chain state (desk level, alpha rank, whether they've linked an X) plus their
   operator's personality. Shouts fire at the maw and at the terminal. */
const pickOne=a=>a[RI(0,a.length-1)];
/* Keep it fresh: never repeat a line while it's still recent. Remembers the last 26
   things anyone said (chatter and shouts share the memory) and re-rolls around them. */
const saidRecently=[];
function freshPick(pool){
  if(!pool || !pool.length) return '';
  let c=null;
  for(let tries=0;tries<40;tries++){
    const cand=pool[RI(0,pool.length-1)];
    if(saidRecently.indexOf(cand)<0){ c=cand; break; }
  }
  if(c===null){                                     // random draw kept colliding — take the
    const fresh=pool.filter(x=>saidRecently.indexOf(x)<0);   // first genuinely unused one
    c = fresh.length ? fresh[RI(0,fresh.length-1)] : pool[RI(0,pool.length-1)];
  }
  saidRecently.push(c);
  if(saidRecently.length>90) saidRecently.shift();  // ~9 speakers, so 26 cycled in about two minutes
  return c;
}

function castRoster(){
  if(!roster.length) return;
  // X-linked wallets first, then ONE per distinct operator: casting purely by alpha
  // put nine identical "The Closer"s on the floor, since every whale runs the top op.
  // Each figure is still a real wallet wearing its own highest operator.
  const pool=roster.filter(p=>p.handle).concat(roster.filter(p=>!p.handle));
  const seen=new Set(), cast=[];
  pool.forEach(p=>{ if(!seen.has(p.op)){ seen.add(p.op); cast.push(p); } });
  pool.forEach(p=>{ if(cast.indexOf(p)<0) cast.push(p); });
  workers.forEach((w,i)=>castPlayer(w, cast[i%cast.length]));
}

  dayl=Math.max(0,Math.min(1,Math.sin((dayT-0.25)*6.2832)*1.5+0.32));
  const bkt=Math.floor(dayT*720);
  if(bkt!==skyBucket){ skyBucket=bkt; paintSky(); }
  mawHeat=Math.max(0,mawHeat-dt*1.1);
  roomSurge=Math.max(0,roomSurge-dt*1.3);
  termFlash=Math.max(0,termFlash-dt*1.6);
  elevOpen = workers.some(w=>w.leaving||w.exiting) ? 1 : Math.max(0,elevOpen-dt*.55);
  elevDing=Math.max(0,elevDing-dt*1.6);
  elevCall=Math.max(0,elevCall-dt);
  coolerUse=Math.max(0,coolerUse-dt*.35);
  shake*=Math.pow(.0016,dt);
  molochWake=Math.max(.3,molochWake-dt*.004);
  updParts(dt); updFloats(dt); updFlies(dt);
  workers.forEach(w=>w.update(dt));

  const sx=(Math.random()-.5)*shake, sy=(Math.random()-.5)*shake;
  cam.x=Math.sin(T*.00013)*2.2+sx; cam.y=Math.cos(T*.00009)*1.1+sy;

  /* 1. scene */
  g.setTransform(1,0,0,1,0,0); g.clearRect(0,0,VW,H);
  g.save(); g.translate(Math.round(-VX-cam.x),Math.round(-cam.y));
  g.drawImage(skyCv,0,0);                                  // live sky behind the glass
  g.drawImage(bg,0,0);                                     // interior, window bays transparent
  updateWeather(dt);
  drawRain(g);                                             // rain streaks on the deco glass
  stepTicker();                                            // DOM tape across the ceiling
  drawClockHands(g);                                       // real time on the wall clock
  drawCoolerBubbles(g);

  // ---- the maw: a molten furnace that CHURNS, and a jaw that opens to swallow ----
  const heat=.42+mawHeat*.58+Math.sin(T*.0012)*.05;   // fire was strobing — all these rates cut ~4x
  const jaw=mawHeat;
  const m=MOL.maw;
  const open=Math.round(jaw*7);
  const fh=m.h+open;
  r(g,m.x,m.y,m.w,fh,'#1c0a03');
  for(let cx=0;cx<m.w;cx+=2){                            // ember bed at the base
    const eh=3+Math.abs(Math.sin(cx*.5+T*.0018))*3;
    r(g,m.x+cx,m.y+fh-eh,2,eh,'#c24a0a');
  }
  /* Flame TONGUES that lick upward. Each column's lateral offset is a sine in
     (height − time), so the wave travels UP the flame while the tongue narrows and
     brightens toward its tip. The previous version was fixed-x columns of varying
     height, which read as a bar chart rather than fire. */
  const AMP=[3.0,1.9];
  for(let li=0;li<2;li++){
    const amp=AMP[li];
    for(let i=0;i<12;i++){
      const bx0=m.x+3+i*((m.w-6)/11), ph=i*1.9+li*0.9;
      const tall=(fh-4)*(.44+.38*Math.abs(Math.sin(ph+T*.0013)))*(0.68+heat*.55)*(1-li*0.18);
      for(let yy=0;yy<tall;yy++){
        const t=yy/tall;
        const wob=Math.sin(yy*.20 - T*.0055 + ph)*(amp*(0.35+t*1.5));
        const wdt=Math.max(1,Math.round((4-li)*(1-t*0.8)));
        let px=Math.round(bx0+wob-wdt/2);
        if(px<m.x) px=m.x;
        if(px+wdt>m.x+m.w) px=m.x+m.w-wdt;
        const c = t<.30?'#c24a0a' : t<.58?'#ff6a1a' : t<.82?'#ffab3a' : '#ffe6a8';
        g.globalAlpha=(li?0.9:0.6)*(t>.86?(1-t)/0.14:1);
        r(g,px,m.y+fh-1-yy,wdt,1,c);
      }
    }
  }
  g.globalAlpha=1;
  // fangs: upper fixed, lower drop away as the jaw gapes (tapered, not wispy)
  const fn=9, fp=m.w/fn;
  for(let i=0;i<fn;i++){
    const fx=m.x+Math.round(i*fp)+1, fwd=Math.max(3,Math.round(fp)-1);
    for(let k=0;k<6;k++){ const ww=Math.max(1,fwd-k*1.5); r(g,fx+(fwd-ww)/2, m.y+k, ww,1, k<2?'#544628':'#3a3120'); }
    const by=m.y+m.h+open;
    for(let k=0;k<7;k++){ const ww=Math.max(1,fwd-k*1.4); r(g,fx+(fwd-ww)/2, by-1-k, ww,1, k<2?'#2f2718':'#211b10'); }
  }
  if(mawHeat>.05) for(let syy=m.y-14;syy<m.y;syy+=2){ const jx=Math.sin(T*.02+syy)*mawHeat*2; g.drawImage(cv, m.x,syy,m.w,1, m.x+jx,syy,m.w,1); }

  // molten seams: hairline cracks in the iron that breathe with the furnace
  const seamA=Math.min(1,.20+mawHeat*.75+Math.sin(T*.003)*.08);
  g.fillStyle='rgba(255,120,34,'+seamA.toFixed(2)+')';
  MOL.seams.forEach((s,i)=>{ const f=0.6+0.4*Math.sin(T*.002+i); g.fillRect(s.x,s.y,s.w*f+1,1); });

  // eyes burning in the deep sockets — they flare when the maw is fed
  MOL.eyes.forEach(e=>{
    const a=Math.min(1,.45+molochWake*.45+mawHeat*.5);
    r(g,e.x,e.y,e.w,e.h,'#050302');
    const gy=e.y+Math.round(e.h*.34), gh=Math.max(4,Math.round(e.h*.36));
    g.fillStyle='rgba(255,'+Math.round(88+125*mawHeat)+',28,'+a.toFixed(2)+')';
    g.fillRect(e.x+3,gy,e.w-6,gh);
    r(g,e.x+3+(Math.sin(T*.0006)>0?e.w-13:4), gy,4,gh,'#380f04');          // slit pupil drifts
    r(g,e.x+3,gy,e.w-6,1,'rgba(255,240,190,'+(.22+mawHeat*.6).toFixed(2)+')');
  });

  // brazier flames flanking the altar — they also throw light onto the throne steps
  (MOL.braziers||[]).forEach((b,i)=>{
    for(let k=0;k<8;k++){
      const fh=3+Math.abs(Math.sin(T*.012+i*2.1+k*.8))*5;
      r(g,b.x-4+k, b.y-fh, 1, fh, (k===3||k===4)?'#ffe6a8':(k%2?'#ffab3a':'#ff6a1a'));
    }
  });

  DESKS.forEach(d=>drawDesk(g,d));

  // terminal
  r(g,TERM.x-1,TERM.y-1,TERM.w+2,TERM.h+2,P.ink);
  r(g,TERM.x,TERM.y,TERM.w,TERM.h,'#241a10');
  r(g,TERM.x+3,TERM.y+3,TERM.w-6,TERM.h-12,termFlash>.5?'#3f7f5c':P.crtD);
  for(let i=0;i<5;i++) r(g,TERM.x+5,TERM.y+5+i*4,RI(6,TERM.w-10),1,P.crt);
  r(g,TERM.x+3,TERM.y+TERM.h-7,TERM.w-6,4,P.brassD);

  drawElevatorCar(g);                                      // car interior BEHIND the riders
  // y-sorted actors
  workers.slice().sort((a,b)=>a.y-b.y).forEach(w=>w.draw(g));
  drawElevatorDoors(g);                                    // door panels in FRONT, so a rider is hidden once shut
  updatePlates();                                          // DOM identity plates, capped + collision-skipped
  updateBubbles();                                         // speech follows whoever is talking
  drawFlies(g);                                            // the thrown offering / paid-out coins
  drawFloats(g);                                           // rising -N / +N FLOOR numbers
  drawParts(g);
  drawFern(g);                                             // foreground frame
  g.restore();

  /* 2. lighting map (multiply) */
  ligx.setTransform(1,0,0,1,0,0);
  ligx.globalCompositeOperation='source-over';
  ligx.fillStyle=mix('#8f88ac','#dad5e6',dayl); ligx.fillRect(0,0,W,H);   // daylight lifts the whole room
  ligx.globalCompositeOperation='lighter';
  const lampA=.95-dayl*.45;                                // the pendants matter less at noon
  for(let i=0;i<5;i++) light(ligx,40+i*66,28,98,'rgba(255,214,140,.95)',lampA);
  light(ligx,W*.42,FLOOR_Y+30,165,'rgba(255,196,120,.55)',.6-dayl*.2);
  light(ligx,60,FLOOR_Y-6,86,'rgba(255,206,138,.7)',.42-dayl*.15);   // west end (cooler + fern)
  if(dayl>.05) for(let i=0;i<5;i++) light(ligx,45+i*66,118,112,'rgba(198,224,255,.9)',dayl*.55);  // sun through the glass
  light(ligx,m.x+m.w/2,m.y+m.h/2, 108+mawHeat*70,'rgba(255,150,60,1)',.55+mawHeat*.45);
  light(ligx,MOL.x+MOL.w/2,MOL.y+78,132,'rgba(255,140,64,.9)',.52+mawHeat*.30);   // must cover the WHOLE idol incl. horn tips, or they fall outside the falloff and vanish
  (MOL.braziers||[]).forEach(b=>light(ligx,b.x,b.y-6,40,'rgba(255,150,60,.9)',.45));
  light(ligx,MOL.x+MOL.w/2,MOL.y+14,124,'rgba(255,180,110,.85)',.50);            // crown + horns sit past the face light's falloff
  light(ligx,TERM.x+TERM.w/2,TERM.y+10,34,'rgba(120,240,170,.9)',.3+termFlash*.4);
  if(leaderDesk) light(ligx,leaderDesk.x+15,leaderDesk.y-16,46,'rgba(255,224,150,.95)',.55);   // gold lamp on the week's leader
  if(elevOpen>.05) light(ligx,ELEV.x+ELEV.w/2,ELEV.y+ELEV.h/2,40,'rgba(255,210,120,1)',elevOpen*.6);
  if(roomSurge>0) { ligx.fillStyle='rgba(255,170,80,'+(roomSurge*.30).toFixed(3)+')'; ligx.fillRect(0,0,W,H); }
  if(lightning>.02){ ligx.fillStyle='rgba(150,180,230,'+(lightning*.6).toFixed(3)+')'; ligx.fillRect(0,0,330,FLOOR_Y); }
  g.save(); g.translate(-VX,0);                            // passes 2+3 are painted in WORLD coords
  g.globalCompositeOperation='multiply'; g.drawImage(lig,0,0);
  g.globalCompositeOperation='source-over';

  /* 3. additive glow + god-ray shafts */
  g.globalCompositeOperation='lighter';
  light(g,m.x+m.w/2,m.y+m.h/2,60+mawHeat*46,'rgba(255,120,40,.55)',.5+mawHeat*.5);
  light(g,MOL.x+MOL.w/2,MOL.y+70,50,'rgba(255,110,40,.30)',.26+mawHeat*.26);      // halo so the horns silhouette
  MOL.eyes.forEach(e=>light(g,e.x+e.w/2,e.y+e.h/2,16+mawHeat*12,'rgba(255,105,28,.55)',.38+mawHeat*.45));
  (MOL.braziers||[]).forEach(b=>light(g,b.x,b.y-5,15,'rgba(255,120,40,.5)',.40));
  for(let i=0;i<5;i++) light(g,40+i*66,20,20,'rgba(255,214,140,.5)',.32);
  light(g,TERM.x+TERM.w/2,TERM.y+8,16,'rgba(120,240,170,.5)',.25+termFlash*.5);
  if(leaderDesk) light(g,leaderDesk.x+15,leaderDesk.y-16,26,'rgba(255,214,140,.5)',.35);
  const shaftA=.04+dayl*.18+lightning*.30*wxr+Math.sin(T*.0006)*.02;   // shafts strengthen in daylight
  for(let i=0;i<5;i++){ const wx=45+i*66; const grd=g.createLinearGradient(wx,24,wx-26,FLOOR_Y);
    grd.addColorStop(0,'rgba(190,205,235,'+shaftA.toFixed(3)+')'); grd.addColorStop(1,'rgba(190,205,235,0)');
    g.fillStyle=grd; g.beginPath(); g.moveTo(wx-9,24); g.lineTo(wx+11,24); g.lineTo(wx-14,FLOOR_Y); g.lineTo(wx-40,FLOOR_Y); g.closePath(); g.fill(); }
  g.globalCompositeOperation='source-over';
  g.restore();                                             // end world-coord passes

  /* 4. bloom */
  blx.clearRect(0,0,bl.width,bl.height);
  blx.drawImage(cv,0,0,bl.width,bl.height);
  g.globalCompositeOperation='lighter'; g.globalAlpha=.30;
  g.drawImage(bl,0,0,VW,H); g.globalAlpha=1; g.globalCompositeOperation='source-over';

  /* 5. post: barrel + chromatic aberration + film grain + vignette + scanlines */
  if(FX && idxG){ postFX(); }
  else {
    const vg=g.createRadialGradient(VW/2,H/2,H*.34,VW/2,H/2,H*.92);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(4,3,10,.42)');
    g.fillStyle=vg; g.fillRect(0,0,VW,H);
    g.fillStyle='rgba(0,0,0,.055)'; for(let y=0;y<H;y+=2) g.fillRect(0,y,VW,1);
  }
}

/* ---- post-processing: precomputed warp/CA/vignette maps + animated grain (one getImageData pass) ---- */
/* Heavy CRT treatment is OFF by default: the grain read as dirt and the chromatic
   aberration fringed every glyph. F toggles it for the cinematic look. The clean
   path still gets a vignette + scanlines, and costs no getImageData readback. */
let FX=false, idxR,idxG,idxB,vigA,grainBuf,GNMASK,fxOut;
function buildWarp(){
  const N=VW*H; idxR=new Int32Array(N); idxG=new Int32Array(N); idxB=new Int32Array(N); vigA=new Float32Array(N);
  const cx=(VW-1)/2, cy=(H-1)/2, K=0.05, CA=0.35, VIG=0.30;
  const cl=(v,mx)=>v<0?0:(v>mx?mx:v)|0;
  for(let y=0;y<H;y++)for(let x=0;x<VW;x++){
    const i=y*VW+x, nx=(x-cx)/cx, ny=(y-cy)/cy, r2=nx*nx+ny*ny;
    const f=1 - K*r2*0.5;                                   // barrel: sample nearer centre at the edges (gentle CRT bulge)
    const sxg=cx+(x-cx)*f, syg=cy+(y-cy)*f;
    const cao=CA*r2*(nx>=0?1:-1);                           // chromatic aberration ramps with radius
    idxG[i]=cl(syg,H-1)*VW+cl(sxg,VW-1);
    idxR[i]=cl(syg,H-1)*VW+cl(sxg+cao,VW-1);
    idxB[i]=cl(syg,H-1)*VW+cl(sxg-cao,VW-1);
    let v=1 - VIG*r2; if(v<0)v=0; if(y&1)v*=0.90; vigA[i]=v; // vignette + scanline baked in
  }
  const GN=1<<16; GNMASK=GN-1; grainBuf=new Float32Array(GN);
  for(let k=0;k<GN;k++) grainBuf[k]=(Math.random()*2-1)*2.2;
  fxOut=g.createImageData(VW,H);
}
function postFX(){
  const src=g.getImageData(0,0,VW,H).data, o=fxOut.data, N=VW*H, go=RI(0,GNMASK);
  for(let i=0;i<N;i++){
    const q=i<<2, v=vigA[i], gn=grainBuf[(i+go)&GNMASK];
    let Rr=src[idxR[i]<<2]*v+gn, Gg=src[(idxG[i]<<2)+1]*v+gn, Bb=src[(idxB[i]<<2)+2]*v+gn;
    o[q]  =Rr<0?0:Rr>255?255:Rr;
    o[q+1]=Gg<0?0:Gg>255?255:Gg;
    o[q+2]=Bb<0?0:Bb>255?255:Bb;
    o[q+3]=255;
  }
  g.putImageData(fxOut,0,0);
}

/* ============================ CHOREOGRAPHY ============================ */
function freeWorker(){ const f=workers.filter(w=>!w.busy); return f.length?f[RI(0,f.length-1)]:null; }
/* thrown things: the offering ARCS from the broker's hand into the maw, and coins
   arc back OUT of the terminal into their hands. */
const flies=[];
function fly(x,y,tx,ty,kind,onLand){
  flies.push({sx:x,sy:y,x,y,tx,ty,kind,t:0.62,max:0.62,onLand});
}
function updFlies(dt){
  for(let i=flies.length-1;i>=0;i--){
    const f=flies[i]; f.t-=dt;
    const p=Math.min(1,1-Math.max(0,f.t)/f.max);
    f.x=f.sx+(f.tx-f.sx)*p;
    f.y=f.sy+(f.ty-f.sy)*p - Math.sin(p*Math.PI)*20;      // lob
    if(f.t<=0){ const cb=f.onLand; flies.splice(i,1); if(cb) cb(); }
  }
}
function drawFlies(ctx){
  flies.forEach(f=>{
    const x=f.x|0, y=f.y|0;
    if(f.kind==='bag'){
      r(ctx,x-4,y-4,8,8,P.bronzeK); r(ctx,x-3,y-3,6,6,P.brass);
      r(ctx,x-3,y-3,6,1,P.brassL);  r(ctx,x-2,y-2,1,1,'#fff2c8');
    } else {
      r(ctx,x-2,y-2,4,4,P.bronzeK); r(ctx,x-1,y-1,3,3,'#e6c96b'); r(ctx,x-1,y-1,3,1,'#fff2c8');
    }
  });
}

/* rising damage-numbers: -N FLOOR into the maw, +N FLOOR out of the terminal */
const floats=[];
function popText(x,y,txt,col){ floats.push({x,y,txt,col,life:2.2,max:2.2}); }
function updFloats(dt){
  for(let i=floats.length-1;i>=0;i--){ const f=floats[i]; f.life-=dt; f.y-=dt*8; if(f.life<=0) floats.splice(i,1); }
}
function drawFloats(ctx){
  floats.forEach(f=>{
    const t=Math.max(0,f.life/f.max);
    ctx.globalAlpha = t<.35 ? t/.35 : 1;
    const wpx=f.txt.length*4-1, x0=Math.round(f.x-wpx/2), y0=Math.round(f.y);
    for(let i=0;i<f.txt.length;i++) glyph(ctx,f.txt[i],x0+i*4,y0+1,'#0a0806');   // shadow for legibility
    for(let i=0;i<f.txt.length;i++) glyph(ctx,f.txt[i],x0+i*4,y0,f.col);
    ctx.globalAlpha=1;
  });
}

/* Walk up carrying the bag, TURN TO FACE the idol, wind up, and throw it in. */
function offering(amount,quiet){
  const w=freeWorker(); if(!w) return;
  w.busy=true; w.carry=true;
  const m=MOL.maw, standX=MOL.x+MOL.w/2-64;
  w.goto(standX,1,()=>{
    w.act=m.x+m.w/2; w.dir=1;                        // turn and face the maw
    w.state='work'; w.t=2.2;
    setTimeout(()=>{ w.wind=1; say(w,freshPick(BURN_SHOUT),2500,'shout'); },380);   // wind up + shout...
    setTimeout(()=>{                                  // ...and let it go
      w.wind=0; w.carry=null;
      fly(w.x+10, w.y-w.size-4, m.x+m.w/2, m.y+m.h*0.55, 'bag', ()=>{
        mawHeat=1; roomSurge=quiet?.55:1; molochWake=Math.min(1,molochWake+.06); kick(quiet?1.6:3.4);
        spawn(m.x+m.w/2, m.y+m.h/2, quiet?20:38,'ember');
        spawn(m.x+m.w/2, m.y-6, 12,'steam');
        if(amount) popText(m.x+m.w/2, m.y-14, '-'+fmt(amount)+' FLOOR', '#ff9d4a');
        pushFeed('<b>'+(amount?fmt(amount)+' ':'')+'$FLOOR</b> offered to Moloch','burn'+(quiet?' q':''));
      });
      setTimeout(()=>{ w.act=null; w.goto(rnd(70,290), RI(0,1), ()=>{ w.busy=false; }); },1200);
    },760);
  });
}
let termFlash=0, elevOpen=0, elevDing=0, elevCall=0;
/* Stand at the console, FACE it, and let it pay out coin by coin into their hands. */
function toTerminal(amount,quiet){
  const w=freeWorker(); if(!w) return;
  w.busy=true;
  const standX=TERM.x+TERM.w+10;
  w.goto(standX,1,()=>{
    w.act=TERM.x+TERM.w/2; w.dir=-1;                 // turn and face the terminal
    w.state='work'; w.t=2.4; termFlash=1;
    spawn(TERM.x+TERM.w/2,TERM.y+8,7,'dust');
    for(let i=0;i<5;i++) setTimeout(()=>{
      termFlash=Math.max(termFlash,.85);
      fly(TERM.x+TERM.w-3, TERM.y+TERM.h-8, w.x-4, w.y-w.size+6, 'coin', null);
    },170*i);
    setTimeout(()=>{
      if(amount) popText(w.x, w.y-w.size-14, '+'+fmt(amount)+' FLOOR', '#7fe0a0');
      say(w,freshPick(COLLECT_SHOUT),2300,'shout');
      pushFeed('<b>'+(amount?'+'+fmt(amount)+' $FLOOR':'PnL')+'</b> collected at the terminal',(quiet?'q':''));
    },950);
    setTimeout(()=>{ w.act=null; w.goto(rnd(70,290),RI(0,1),()=>{w.busy=false;}); },1800);
  });
}
/* ---------------------------------------------------------------------------
   THE LIFT. Previously arrivals only fired on a `newdesk` event — 1 of 60 actions
   in the feed — so in practice nobody ever came up, and over-cap workers were just
   deleted mid-floor with no exit. Now it runs its own traffic: the car is called,
   the indicator chases, it dings, the doors part, someone walks out (or steps in
   and rides away), and the doors shut.
   --------------------------------------------------------------------------- */
const CAST_MIN=7, CAST_MAX=12;
const elevMid=ELEV.x+ELEV.w/2;
/* ⚠ The car is drawn in TWO passes around the actors. Drawing the whole lift after
   them meant the car's own interior painted OVER whoever was standing in it, so a
   rider vanished into the back wall. Interior goes BEHIND the actors, door panels
   in FRONT (so a rider is still concealed once the doors shut). */
function drawElevatorCar(ctx){
  if(elevOpen<=.04) return;
  const E=ELEV, eo=Math.round(elevOpen*(E.w/2-2));
  const ix=E.x+E.w/2-eo, iw=eo*2;
  if(iw<=3) return;
  r(ctx,ix,E.y,iw,E.h,'#3a2a14');                              // back wall
  for(let px=ix+2; px<ix+iw-2; px+=6){                         // brass panelling
    r(ctx,px,E.y+4,1,E.h-10,'#4c3a1c'); r(ctx,px+1,E.y+4,1,E.h-10,'#2d2010');
  }
  r(ctx,ix,E.y,iw,2,'#6a5228');                                // ceiling
  r(ctx,ix+Math.max(1,(iw>>1)-3),E.y+2,6,2,'#ffe6a8');         // ceiling light
  r(ctx,ix,E.y+E.h-4,iw,4,'#241a0c');                          // car floor
  r(ctx,ix,E.y+E.h-4,iw,1,'#4a3620');
  const hr=E.y+Math.round(E.h*.56);
  r(ctx,ix+1,hr,iw-2,1,'#8a6d2e');                             // handrail
  r(ctx,ix+2,hr+1,1,2,'#5a4520'); r(ctx,ix+iw-3,hr+1,1,2,'#5a4520');
  ctx.fillStyle='rgba(255,206,124,'+(.14+elevOpen*.26).toFixed(2)+')';
  ctx.fillRect(ix,E.y,iw,E.h);                                 // warm spill
}
function drawElevatorDoors(ctx){
  const E=ELEV, eo=Math.round(elevOpen*(E.w/2-2));
  r(ctx,E.x,E.y,E.w/2-eo,E.h,'#2a1d10');
  r(ctx,E.x+E.w/2+eo,E.y,E.w/2-eo,E.h,'#2a1d10');
  r(ctx,E.x,E.y,E.w/2-eo,1,'#4a3620');
  r(ctx,E.x+E.w/2+eo,E.y,E.w/2-eo,1,'#4a3620');
  r(ctx,E.x+E.w/2-eo-1,E.y,1,E.h,'#0d0a06');
  r(ctx,E.x+E.w/2+eo,E.y,1,E.h,'#0d0a06');
  for(let i=0;i<5;i++){                                 // indicator: chases while the car moves
    const on = elevCall>0 ? (Math.floor(T*.006+i)%5===0) : (i===2);
    r(ctx,E.x+7+i*7,E.y-13,4,3, on?P.brassL:P.brassD);
  }
  if(elevDing>.02) r(ctx,E.x-5,E.y-14,E.w+10,1, elevDing>.5?'#fff2c8':P.brass);
}
function elevatorArrive(loud){
  if(workers.length>=CAST_MAX || elevOpen>.1) return;
  elevCall=0.9; elevDing=1;
  setTimeout(()=>{
    elevOpen=1; kick(loud?1.6:.7);
    const w=new Worker(workers.length);
    w.x=elevMid; w.y=LANE[0]; w.lane=0; w.dir=1;
    w.exiting=true;                                     // holds the doors until they're clear
    if(roster.length) castPlayer(w, roster[RI(0,roster.length-1)]);
    workers.push(w);
    setTimeout(()=>w.goto(rnd(80,280),RI(0,1)),260);    // step out once the doors are parted
  },820);
}
function elevatorDepart(w){
  if(!w || w.busy || elevOpen>.1) return;
  w.busy=true; w.act=null; w.carry=null;
  w.leaving=true; elevDing=1; elevOpen=1;               // doors part as they head over, so they
  w.goto(elevMid,0,()=>{                                // don't walk behind a shut door and vanish
    w.dir=-1;
    setTimeout(()=>{
      w.riding=0;                                       // fades out as the doors shut
      setTimeout(()=>{ const i=workers.indexOf(w); if(i>=0) workers.splice(i,1); },760);
    },320);
  });
}
const arrival=()=>elevatorArrive(true);                 // on-chain "new desk" = a loud arrival

/* ============================ SCALING ============================ */
/* ⚠ Integer-ONLY scaling looked fine in a full-bleed 1920x1080 test render (exactly 4x)
   but collapsed to 2x in a real browser window — chrome eats ~120px of height, 810 is
   the 3x threshold, so the scene drew at 960x540 marooned in black and read as "smaller
   / missing things". Fill the viewport instead, and only snap to an integer when we're
   already within a hair of one (image-rendering:pixelated keeps it crisp either way). */
/* VIEWPORT CROP. A 480x270 landscape scene on a portrait phone is a thin letterboxed
   strip no matter how you scale it. On a narrow viewport we render a TALLER SLICE of
   the same world instead — full height, less width — which fills the screen properly.
   The slice keeps the terminal, the firm desks and Moloch; the lift is off-frame on a
   phone, which is the trade. Everything still draws in WORLD coords; only the camera
   origin and the canvas width change. */
let VX=0, VW=W;
function chooseView(){
  const a=innerWidth/Math.max(1,innerHeight);
  const want = a<1.5 ? {x:152,w:328} : {x:0,w:W};
  if(want.x===VX && want.w===VW) return false;
  VX=want.x; VW=want.w;
  bl.width=Math.max(1,VW>>2); bl.height=H>>2; blx.imageSmoothingEnabled=false;
  return true;
}
function fit(){
  const changed=chooseView();
  const s=Math.max(1,Math.min(innerWidth/VW, innerHeight/H));
  const si=Math.floor(s);
  const use=(si>=1 && s-si<0.12) ? si : s;
  cv.width=VW; cv.height=H;
  cv.style.width=Math.round(VW*use)+'px'; cv.style.height=Math.round(H*use)+'px';
  g.imageSmoothingEnabled=false;
  if(changed && idxG) buildWarp();          // warp maps are sized to the view
  syncOverlay();
}
let OVU=4;                                        // screen px per canvas px — DOM plates position with this
function syncOverlay(){
  const rct=cv.getBoundingClientRect();
  ov.style.left=rct.left+'px'; ov.style.top=rct.top+'px'; ov.style.width=rct.width+'px'; ov.style.height=rct.height+'px';
  OVU=rct.width/VW;                               // overlay maps to the VIEW, not the whole world
  ov.style.setProperty('--u',OVU+'px');
  ov.classList.toggle('tiny', OVU<2.1);           // phone / embedded band

  buildTicker();                                  // width depends on --u, so re-measure on resize
}
addEventListener('resize',fit);
addEventListener('keydown',e=>{ if(e.key==='f'||e.key==='F') FX=!FX; });

/* ============================ LIVE CHAIN DATA ============================ */
const tk={price:0,burned:0,supply:0,firms:[]};   // ticker + nameplate source
let seen=new Set(), firstLoad=true; const evq=[];
setInterval(()=>{
  if(!evq.length) return;
  if(workers.filter(w=>w.busy).length>=2) return;
  (evq.shift())();
},1400);

/* One on-chain action -> one bit of choreography. Shared by the live queue AND the
   quiet-replay loop so both stage identically; replays just land softer. */
function playAction(a,quiet){
  const kind=(a.t||a.kind||'').toLowerCase();
  const amt=a.amt||a.amount||a.value||0;                 // API field is .amt — .amount/.value are always undefined
  if(kind.includes('burn')) offering(amt,quiet);
  else if(kind.includes('collect')||kind.includes('claim')) toTerminal(amt,quiet);
  else if(kind.includes('newdesk')){ arrival(); pushFeed('<b>New desk</b> opened',quiet?'q':''); }
  else if(kind.includes('recruit')||kind.includes('seat')||kind.includes('starter')) pushFeed('<b>Operator seated</b>',quiet?'q':'');
  else if(kind.includes('upgrade')) pushFeed('<b>Desk upgraded</b>',quiet?'q':'');
  else if(kind.includes('referral')) pushFeed('<b>Referral paid</b>',quiet?'q':'');
  else if(kind.includes('unseat')) pushFeed('<b>Operator left</b> the floor',quiet?'q':'');
}
let recentActions=[];
async function poll(){
  try{
    const j=await (await fetch('/api/live-actions',{cache:'no-store'})).json();
    const acts=(j&&j.actions)||[];
    recentActions=acts;
    if(firstLoad){ acts.forEach(a=>seen.add(a.tx||JSON.stringify(a))); firstLoad=false; return; }
    acts.slice().reverse().forEach(a=>{
      const k=a.tx||JSON.stringify(a); if(seen.has(k))return; seen.add(k);
      if(evq.length>6) return;
      evq.push(()=>playAction(a,false));
    });
  }catch(e){}
}
/* ⚠ The chain goes quiet for long stretches (the newest action can be ~19k blocks
   old) and first-load seeds every known action as `seen` — so on live events alone
   the floor just wanders and NOBODY ever walks to Moloch. Replay a recent REAL
   action on a timer, staged softer, so the ritual is always visible. */
/* Replays used to draw uniformly from the newest 24 actions with no memory, so the
   same one looped — and since only ~2 of those 24 are burns, every offering showed the
   SAME amount over and over (Christi saw 15,000 repeatedly). Now: pick a KIND first so
   the floor isn't two-thirds collects, then a specific action of that kind that hasn't
   been replayed recently, drawing from the whole 60-action window. */
const replayed=[];
const actKey=a=>(a.t||'')+':'+(a.a||'')+':'+(a.amt||0)+':'+(a.blk||0);
function remember(a){ replayed.push(actKey(a)); if(replayed.length>20) replayed.shift(); return a; }
function pickReplay(){
  const pool=recentActions;
  if(!pool.length) return null;
  const kinds=[...new Set(pool.map(a=>a.t))];
  for(let i=0;i<24;i++){
    const k=kinds[RI(0,kinds.length-1)];
    const fresh=pool.filter(a=>a.t===k && replayed.indexOf(actKey(a))<0);
    if(fresh.length) return remember(fresh[RI(0,fresh.length-1)]);
  }
  const any=pool.filter(a=>replayed.indexOf(actKey(a))<0);
  return remember(any.length?any[RI(0,any.length-1)]:pool[RI(0,pool.length-1)]);
}
setInterval(()=>{
  if(evq.length || !recentActions.length) return;
  if(workers.some(w=>w.busy)) return;
  const a=pickReplay();
  if(a) playAction(a,true);
},7000);

/* Lift traffic on its own clock — people come and go regardless of what the chain
   is doing. Tying arrivals solely to `newdesk` events meant the lift never ran. */
const idleWorkers=()=>workers.filter(w=>!w.busy && w.riding==null);
setInterval(()=>{
  if(elevOpen>.1 || elevCall>0) return;
  const n=workers.length, pool=idleWorkers();
  if(n<CAST_MIN) return elevatorArrive(false);
  if(n>CAST_MAX) return elevatorDepart(pool[0]);
  if(Math.random()<.55) elevatorArrive(false);
  else if(pool.length>2) elevatorDepart(pool[RI(0,pool.length-1)]);
},13000);

/* One window, somewhere in the city, changes its mind. Someone works late, someone
   goes home. Slow and singular — the point is you catch it out of the corner of
   your eye, not that the skyline blinks. */
setInterval(()=>{
  if(!cityNear.length) return;
  const b=cityNear[RI(0,cityNear.length-1)];
  if(b.win.length) b.win[RI(0,b.win.length-1)].on ^= 1;
},4200);

/* Water-cooler break. The cooler was pure scenery until now. */
setInterval(()=>{
  if(Math.random()<.35) return;
  const w=freeWorker(); if(!w) return;
  w.busy=true;
  w.goto(COOL.x+15,0,()=>{
    w.act=COOL.x+4; w.dir=-1; w.state='work'; w.t=2.6; coolerUse=1;
    setTimeout(()=>{ w.act=null; w.goto(rnd(70,290),RI(0,1),()=>{ w.busy=false; }); },2800);
  });
},19000);
async function stats(){
  try{
    const j=await (await fetch('/api/token-stats',{cache:'no-store'})).json();
    if(j&&j.ok!==false){
      tk.price=Number(j.price)||tk.price; tk.burned=Number(j.burned)||tk.burned; tk.supply=Number(j.supply)||tk.supply;
      tk.perAlphaDay=Number(j.perAlphaDay)||tk.perAlphaDay;   // drives FLOOR/day on the player card
      tk.halveAt=Number(j.halveAt)||tk.halveAt;               // drives the halving-aware chatter
      document.getElementById('sBurn').textContent=fmt(j.burned||0);
      document.getElementById('sSupply').textContent=fmt(j.supply||0);
      if(j.halveAt){ const d=Math.max(0,j.halveAt-Date.now()); const dd=Math.floor(d/86400000), hh=Math.floor(d/3600000)%24;
        document.getElementById('sHalve').textContent=dd+'d '+hh+'h'; }
      buildTicker();
    }
  }catch(e){}
}
async function fetchFirms(){
  try{
    const j=await (await fetch('/api/firm-competition',{cache:'no-store'})).json();
    if(j&&j.ok&&Array.isArray(j.firms)&&j.firms.length){
      tk.firms=j.firms.slice(0,7);                          // API already sorted rank-1 first
      assignFirms(tk.firms);
      buildTicker();
    }
  }catch(e){}
}

/* ambient life so the floor is never still */
setInterval(()=>{
  if(Math.random()<.35) spawn(rnd(30,300),rnd(60,150),1,'dust');
  if(Math.random()<.5) spawn(MOL.maw.x+rnd(6,MOL.maw.w-6),MOL.maw.y+4,1,'ember');
  if(Math.random()<.22) spawn(MOL.x+MOL.w/2+rnd(-30,30),MOL.y+60,1,'steam');
},240);

/* boot */
buildCity(); paintStatic(); paintMoloch(); fit(); buildWarp();
if(_q.has('rain')){ wxState='rain'; wxr=1; wxT=999; }     // ?rain=1 forces a downpour (declared below the sky block)
buildTicker();
pushFeed('<b>The floor</b> is open');
poll(); stats(); fetchFirms(); fetchRoster();
setInterval(poll,20000); setInterval(stats,60000); setInterval(fetchFirms,120000); setInterval(fetchRoster,300000);
let last=performance.now();
(function loop(now){ const dt=Math.min(.05,(now-last)/1000); last=now; frame(dt); requestAnimationFrame(loop); })(performance.now());
</script>
